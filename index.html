<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookies</title>
    <link rel="stylesheet" href="styles/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>
    
<body>
    
    <header>
        <nav class="navbar">
            <ul>
                <li id="title">Cookies</li>
                <li id="home"><a href="index.html">Home</a></li>
                <li id="products"><a href="#cookies-section">Products</a></li>
                <li>
                    <button id="cart">
                        <img src="images/cart3.webp" id="cart-logo" alt="cart">
                        <span id="cart-count">0</span>
                    </button>
                </li>
            </ul>
        </nav>
    </header>
    
    <main>
        <section>
            <div id="background-img">
                <h1 class="auto-hide">Ordering Cookies Made Easy</h1>
                <a href="#cookies-section">
                <button id="shop-button">Shop Now </button>
                </a>
                <h1 class="auto-show"  id="products-title">Products</h1>
            </div>
        </section>

        <section>
            <div id="cookies-section">
                <div class="cookies">
                    <div id="candy-cookie" class="cookie-image"> <img src="images/cookie4.webp"></div>
                    <div class="cookie-title">Hershey Cookie</div>
                    <div class="price-and-cart">
                        <p class="price">$100</p>
                        <button class="add-cart-button">Add To Cart</button>
                    </div>
                </div>
                <div class="cookies">
                    <div class="cookie-image"> <img src="images/raisin-cookie.webp" alt="chocolate chip cookie"></div>
                    <div class="cookie-title">Raisin Cookie</div>
                    <div class="price-and-cart">
                        <p class="price">$100</p>
                        <button class="add-cart-button">Add To Cart</button>
                    </div>
                </div>
                <div class="cookies">
                    <div class="cookie-image"><img src="images/cookie1.png" alt="raisin cookie"></div>
                    <div class="cookie-title">Chocolate Chip Cookie</div>
                    <div class="price-and-cart">
                        <p class="price">$100</p>
                        <button class="add-cart-button">Add To Cart</button>
                    </div>
                </div>
            </div>
        </section>
    </main>


    <div class="checkout-cart-container">
        <h2>Cart</h2>
        <hr>
    </div>



    <hr>
    <footer>
        
        
            <ul>
                <li><a href="https://www.youtube.com/" target="_blank"><img id="youtube-image" src="images/youtube.webp" alt="youtube shortcut"></a></li>
                <li><a href="https://www.x.com/" target="_blank"><img  src="images/twitter.png" alt="youtube shortcut"></a></li>
                <li><a href="https://www.instagram.com/" target="_blank"><img src="images/instagram.png" alt="youtube shortcut"></a></li>
            </ul>
        
    </footer>

    <script src="js/script.js"></script>

</body>
</html>
